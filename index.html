<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Asteroids Duel - Online & AI</title>
	<script src="coi-serviceworker.min.js"></script>
	<style>
		body {
			background-color: #141414;
			color: #ffffff;
			font-family: 'Courier New', Courier, monospace;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			overflow: hidden;
		}

		#game-container {
			border: 4px solid #ffffff;
			box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
			position: relative;
			background-color: #000;
		}

		canvas {
			display: block;
			image-rendering: pixelated;
		}

		.title {
			font-size: 2.5rem;
			margin-bottom: 20px;
			letter-spacing: 5px;
			color: #0ff;
			text-shadow: 2px 2px #f0f;
		}

		.status-bar {
			margin-top: 15px;
			font-size: 0.9rem;
			color: #888;
		}

		/* Pixel Art Loading Spinner */
		#loading {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			text-align: center;
		}
	</style>
</head>

<body>
	<h1 class="title">ASTEROIDS VERSUS</h1>

	<div id="game-container">
		<!-- Godot Web Export goes here -->
		<div id="loading">LOADING GAME ENGINE...</div>
		<canvas id="canvas"></canvas>
	</div>

	<div class="status-bar">
		MULTIPLAYER | AI NEURAL NETWORK | PIXEL PHYSICS
	</div>

	<script>
		// Godot initialization script would go here after export
		console.log("Asteroids Duel Web Wrapper Active");
	</script>
</body>

</html>
